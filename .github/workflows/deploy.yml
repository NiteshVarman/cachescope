name: build-and-deploy

# Builds the Host image, pushes it to GHCR, and rolls it out to the Azure
# Container App. Infra itself (infra/main.bicep) is provisioned once, manually.
#
# Required repo configuration:
#   Secrets:   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID  (OIDC federated credential)
#   Variables: AZURE_RESOURCE_GROUP, CONTAINERAPP_NAME  (e.g. cachescope-api)
# GHCR uses the built-in GITHUB_TOKEN — no extra secret needed.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write   # required for Azure OIDC login

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Run unit tests
        run: dotnet test src/CacheScope.Tests/CacheScope.Tests.csproj -c Release

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # GHCR repository names must be lowercase; the owner login can be mixed-case,
      # so normalise it into a lowercase image reference used by every later step.
      - name: Compute lowercase image name
        id: image
        run: echo "ref=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/cachescope-host" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.ref }}:latest
            ${{ steps.image.outputs.ref }}:${{ github.sha }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy new image to Container App
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ${{ vars.CONTAINERAPP_NAME }} \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --image ${{ steps.image.outputs.ref }}:${{ github.sha }}
