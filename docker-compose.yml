# Local development topology that mirrors the cloud:
#   - redis  -> self-hosted Redis (L3), same as the Redis container app in Azure
#   - host   -> the CacheScope API. L2 (IMemoryCache) and L4 (embedded SQLite) both live
#               inside this process; SQLite is a file in the container (ephemeral, re-seeded on boot).
# Cloudflare (L0) and the browser cache (L1) are not modelled locally — they only
# exist in front of the public deployment.
#
# Usage:  docker compose up --build
name: cachescope

services:
  redis:
    image: redis:7-alpine
    container_name: cachescope-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]  # pure cache, no persistence
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  host:
    build:
      context: ./src
      dockerfile: Dockerfile
    container_name: cachescope-host
    depends_on:
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Redis: "redis:6379"
      ConnectionStrings__Sql: "Data Source=/tmp/cachescope.db"   # embedded SQLite (L4)
    ports:
      - "5199:8080"

volumes: {}
